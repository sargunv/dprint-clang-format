[workspace]
name = "dprint-clang-format-wasm-spike"
version = "0.1.0"
description = "Spike for validating a sandboxed dprint clang-format WebAssembly plugin."
authors = ["Sargun V <sargunv@users.noreply.github.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
clangxx = ">=22.1.7,<23"
cmake = ">=4.0,<5"
curl = ">=8,<9"
git = ">=2.49,<3"
lld = ">=22.1.7,<23"
ninja = ">=1.12,<2"
python = ">=3.13,<3.14"
wabt = ">=1.0.37,<2"

[tasks]
check-tools = "scripts/check_tools.sh"
fetch-llvm = "scripts/fetch_llvm.sh"
configure-llvm-wasm = "scripts/configure_llvm_wasm.sh"
build-dprint-plugin = "scripts/link_libformat_wasm.sh"
smoke-dprint-plugin = "scripts/smoke_dprint_plugin.sh"
