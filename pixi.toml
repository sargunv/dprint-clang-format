[workspace]
name = "dprint-plugin-clang-format"
version = "0.1.0"
description = "Sandboxed dprint WebAssembly plugin for clang-format via LLVM/Clang LibFormat."
authors = ["Sargun Vohra <sargunv@users.noreply.github.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]

[dependencies]
clangxx = ">=22.1.7,<23"
lld = ">=22.1.7,<23"
wabt = ">=1.0.37,<2"
