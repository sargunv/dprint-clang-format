name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-deps
      - run: mise run hygiene

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ci-deps
      - run: mise run ci-build

      - name: Upload plugin Wasm
        uses: actions/upload-artifact@v4
        with:
          name: dprint-plugin-clang-format-wasm
          path: build/plugin.wasm
          if-no-files-found: error

  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - hygiene
      - build
    permissions:
      contents: write
    steps:
      - name: Download plugin Wasm artifact
        uses: actions/download-artifact@v4
        with:
          name: dprint-plugin-clang-format-wasm
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/plugin.wasm
