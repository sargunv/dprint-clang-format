name: Setup CI deps
description: Install mise toolchain and cache project dependencies

runs:
  using: composite
  steps:
    - name: Cache LLVM source
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          third_party/cache
          third_party/llvm-project-22.1.8.src
        key: llvm-22.1.8-v1-${{ hashFiles('scripts/fetch_llvm.sh', 'support/patches/*.patch') }}

    - name: Cache Pixi environment
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .pixi/envs/default
        key: pixi-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pixi.lock') }}

    - name: Install mise toolchain
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        cache: true
        cache_key_prefix: mise-v1
        install: true
