[settings]
experimental = true
pin = true
install_before = "3d"
lockfile = true

[tools]
"aqua:apple/pkl" = "0.31.1"
"aqua:dprint/dprint" = "0.54.0"
"aqua:jdx/hk" = "1.48.0"
"aqua:Kitware/CMake" = "4.3.3"
"aqua:ninja-build/ninja" = "1.13.2"
"core:python" = "3.13"
"github:prefix-dev/pixi" = "0.70.2"

[deps.pixi]
auto = true
sources = ["pixi.toml", "pixi.lock"]
outputs = [".pixi/envs/default"]
run = "pixi install --locked"

[deps.llvm]
sources = ["support/patches", "scripts/apply_llvm_patches.sh"]
outputs = ["third_party/llvm-project-22.1.7.src/llvm/CMakeLists.txt"]
run = '''
llvm_version="${LLVM_VERSION:-22.1.7}"
archive_name="llvm-project-${llvm_version}.src.tar.xz"
release_tag="llvmorg-${llvm_version}"
url="https://github.com/llvm/llvm-project/releases/download/${release_tag}/${archive_name}"

cache_dir="third_party/cache"
source_dir="third_party/llvm-project-${llvm_version}.src"
archive_path="${cache_dir}/${archive_name}"
sha_path="${archive_path}.sha256"

mkdir -p "$cache_dir" third_party

if [[ ! -f "$archive_path" ]]; then
  curl --fail --location --retry 3 --output "$archive_path" "$url"
fi

shasum -a 256 "$archive_path" | tee "$sha_path"

if [[ ! -d "$source_dir" ]]; then
  tar -C third_party -xf "$archive_path"
fi

test -f "$source_dir/llvm/CMakeLists.txt"
test -f "$source_dir/clang/lib/Format/Format.cpp"

scripts/apply_llvm_patches.sh

echo "LLVM source ready: $source_dir"
'''

[tasks.check]
description = "Run configured repo checks."
run = "hk check --all"

[tasks.fix]
description = "Run configured repo fixers."
run = "hk fix --all"

[tasks.configure]
description = "Configure the LLVM/Clang Wasm build and dprint plugin build."
run = '''
mise deps llvm

repo_root="$PWD"
llvm_version="${LLVM_VERSION:-22.1.7}"
source_root="third_party/llvm-project-${llvm_version}.src"
build_dir="${LLVM_WASM_BUILD_DIR:-build/llvm-wasm}"

host_flags="-DLLVM_ON_UNIX -DHAVE_SYSEXITS_H=1 -DHAVE_SYSCONF=1 -DHAVE_GETRUSAGE=1 -DHAVE_SYS_MMAN_H=1 -DHAVE_DLOPEN=1"
common_cxx_flags="-ffreestanding $host_flags -DCLANG_BUILD_STATIC=1 -fno-exceptions -fno-rtti -fno-threadsafe-statics -nostdinc++ -D_LIBCPP_DISABLE_EXTERN_TEMPLATE -isystem $repo_root/support/libcxx-wasm/include -isystem $repo_root/$source_root/libcxx/include -isystem $repo_root/$source_root/libcxx/src/include -isystem $repo_root/support/wasm-sysroot/include"
common_c_flags="-ffreestanding $host_flags -DCLANG_BUILD_STATIC=1 -isystem $repo_root/support/wasm-sysroot/include"

native_tool_dir="${LLVM_NATIVE_TOOL_DIR:-$repo_root/$build_dir/NATIVE/bin}"
if [[ ! -f "$native_tool_dir/llvm-tblgen" && -f "$repo_root/build/llvm-wasm/NATIVE/bin/llvm-tblgen" ]]; then
  native_tool_dir="$repo_root/build/llvm-wasm/NATIVE/bin"
fi
if [[ ! -f "$native_tool_dir/llvm-tblgen" ]]; then
  echo "native tablegen tools not found at $native_tool_dir" >&2
  echo "build host tools first: pixi run ninja -C build/llvm-wasm clang-tblgen llvm-tblgen" >&2
  exit 1
fi

if [[ ! -f "$source_root/llvm/CMakeLists.txt" ]]; then
  echo "LLVM source not found at $source_root" >&2
  echo "run: mise deps llvm" >&2
  exit 1
fi

pixi run cmake \
  -S "$source_root/llvm" \
  -B "$build_dir" \
  -G Ninja \
  -DCMAKE_MAKE_PROGRAM="$(command -v ninja)" \
  -DCMAKE_BUILD_TYPE=MinSizeRel \
  -DCMAKE_SYSTEM_NAME=Generic \
  -DCMAKE_C_COMPILER=clang \
  -DCMAKE_CXX_COMPILER=clang++ \
  -DCMAKE_C_COMPILER_TARGET=wasm32-unknown-unknown \
  -DCMAKE_CXX_COMPILER_TARGET=wasm32-unknown-unknown \
  -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
  -DCMAKE_C_FLAGS="$common_c_flags" \
  -DCMAKE_CXX_FLAGS="$common_cxx_flags" \
  -DLLVM_NATIVE_TOOL_DIR="$native_tool_dir" \
  -DLLVM_HEADERS_TABLEGEN="$native_tool_dir/llvm-min-tblgen" \
  -DLLVM_TABLEGEN="$native_tool_dir/llvm-tblgen" \
  -DCLANG_TABLEGEN="$native_tool_dir/clang-tblgen" \
  -DLLVM_ENABLE_PROJECTS=clang \
  -DLLVM_TARGETS_TO_BUILD="" \
  -DLLVM_INCLUDE_TESTS=OFF \
  -DLLVM_INCLUDE_BENCHMARKS=OFF \
  -DLLVM_INCLUDE_EXAMPLES=OFF \
  -DLLVM_BUILD_TOOLS=OFF \
  -DCLANG_BUILD_TOOLS=OFF \
  -DLLVM_ENABLE_BINDINGS=OFF \
  -DLLVM_ENABLE_ZLIB=OFF \
  -DLLVM_ENABLE_ZSTD=OFF \
  -DLLVM_ENABLE_TERMINFO=OFF \
  -DLLVM_ENABLE_LIBXML2=OFF \
  -DLLVM_ENABLE_THREADS=OFF \
  -DLLVM_ENABLE_PIC=OFF \
  -DLLVM_ENABLE_BACKTRACES=OFF \
  -DLLVM_ENABLE_UNWIND_TABLES=OFF

pixi run cmake -S . -B build/plugin -G Ninja \
  -DCMAKE_MAKE_PROGRAM="$(command -v ninja)" \
  -DCMAKE_TOOLCHAIN_FILE=cmake/wasm32-unknown-unknown.cmake
'''

[tasks.build]
description = "Build the LibFormat archive closure and dprint plugin Wasm."
depends = ["configure"]
run = '''
pixi run ninja -C build/llvm-wasm clangFormat
pixi run cmake --build build/plugin --target plugin
'''

[tasks.test]
description = "Test the built dprint plugin."
depends = ["build"]
run = '''
import_count="$(
  pixi run wasm-objdump -x build/plugin.wasm |
    awk '
      /^Import\[/ {
        value = $0
        sub(/^Import\[/, "", value)
        sub(/\].*$/, "", value)
        print value
        found = 1
      }
      END {
        if (!found) print "0"
      }
    '
)"

if [[ "$import_count" != "0" ]]; then
  echo "expected zero wasm imports, found $import_count" >&2
  pixi run wasm-objdump -x build/plugin.wasm >&2
  exit 1
fi

node tests/plugin_abi_test.js build/plugin.wasm
bash tests/dprint_cli_test.sh
'''

[hooks]
postinstall = ["hk install --mise"]
