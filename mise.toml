[settings]
experimental = true
pin = true
install_before = "3d"
lockfile = true

[tools]
"aqua:apple/pkl" = "0.31.1"
"aqua:bats-core/bats-core" = "1.13.0"
"aqua:dprint/dprint" = "0.54.0"
"aqua:jdx/hk" = "1.48.0"
"aqua:Kitware/CMake" = "4.3.3"
"aqua:ninja-build/ninja" = "1.13.2"
"core:python" = "3.13"
"github:prefix-dev/pixi" = "0.70.2"

[deps.pixi]
auto = true
sources = ["pixi.toml", "pixi.lock"]
outputs = [".pixi/envs/default"]
run = "pixi install --locked"

[deps.llvm]
auto = true
sources = [
  "support/patches",
  "scripts/fetch_llvm.sh",
]
outputs = ["third_party/llvm-project-22.1.7.src/llvm/CMakeLists.txt"]
run = "scripts/fetch_llvm.sh"

[tasks.build]
description = "Build the LibFormat archive closure and dprint plugin Wasm."
depends = ["configure"]
run = "pixi run cmake --build build/plugin --target plugin"

[tasks.configure]
description = "Configure the dprint plugin build."
run = "pixi run cmake --fresh -S . -B build/plugin -G Ninja -DCMAKE_TOOLCHAIN_FILE=cmake/wasm32-unknown-unknown-toolchain.cmake"

[tasks.test]
description = "Test the built dprint plugin."
depends = ["build"]
run = "bats tests"

[hooks]
postinstall = ["hk install --mise"]
