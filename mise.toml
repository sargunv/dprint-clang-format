[settings]
experimental = true
pin = true
install_before = "3d"
lockfile = true

[tools]
"aqua:apple/pkl" = "0.31.1"
"aqua:dprint/dprint" = "0.54.0"
"aqua:jdx/hk" = "1.48.0"
"aqua:Kitware/CMake" = "4.3.3"
"aqua:ninja-build/ninja" = "1.13.2"
"core:python" = "3.13"
"github:prefix-dev/pixi" = "0.70.2"

[deps.pixi]
auto = true
sources = ["pixi.toml", "pixi.lock"]
outputs = [".pixi/envs/default"]
run = "pixi install --locked"

[deps.llvm]
sources = ["support/patches", "scripts/apply_llvm_patches.sh"]
outputs = ["third_party/llvm-project-22.1.7.src/llvm/CMakeLists.txt"]
run = '''
llvm_version="${LLVM_VERSION:-22.1.7}"
archive_name="llvm-project-${llvm_version}.src.tar.xz"
release_tag="llvmorg-${llvm_version}"
url="https://github.com/llvm/llvm-project/releases/download/${release_tag}/${archive_name}"

cache_dir="third_party/cache"
source_dir="third_party/llvm-project-${llvm_version}.src"
archive_path="${cache_dir}/${archive_name}"
sha_path="${archive_path}.sha256"

mkdir -p "$cache_dir" third_party

if [[ ! -f "$archive_path" ]]; then
  curl --fail --location --retry 3 --output "$archive_path" "$url"
fi

shasum -a 256 "$archive_path" | tee "$sha_path"

if [[ ! -d "$source_dir" ]]; then
  tar -C third_party -xf "$archive_path"
fi

test -f "$source_dir/llvm/CMakeLists.txt"
test -f "$source_dir/clang/lib/Format/Format.cpp"

scripts/apply_llvm_patches.sh

echo "LLVM source ready: $source_dir"
'''

[tasks.build]
description = "Build the LibFormat archive closure and dprint plugin Wasm."
depends = ["configure"]
run = "pixi run cmake --build build/llvm-wasm --target clangFormat && pixi run cmake --build build/plugin --target plugin"

[hooks]
postinstall = ["hk install --mise"]
